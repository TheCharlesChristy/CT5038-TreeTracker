  node-lint:
    name: NodeJS Lint
    runs-on: ubuntu-latest

    if: hashFiles('**/package.json') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run Node lint
        run: npm run lint