name: ct5038-treetracker-local

services:
  mysql:
    image: mysql:8.0
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-treetracker_dev}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD:-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  expo-web-build:
    build:
      context: ..
      dockerfile: docker/images/expo.Dockerfile
    restart: "no"
    working_dir: /workspace/TreeGuardiansExpo
    environment:
      WEB_BUILD_DEBOUNCE_SECONDS: ${WEB_BUILD_DEBOUNCE_SECONDS:-2}
    volumes:
      - ../:/workspace
      - expo_node_modules:/workspace/TreeGuardiansExpo/node_modules
      - ../logs:/workspace/logs
    command: >
      bash -lc "/workspace/docker/scripts/watch-expo-web.sh"

  server:
    build:
      context: ..
      dockerfile: docker/images/server.Dockerfile
    restart: "no"
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
      expo-web-build:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: ${SERVER_PORT:-4000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_DATABASE: ${MYSQL_DATABASE:-treetracker_dev}
      DB_ALLOW_CREATE_DATABASE: "true"
      DB_SCHEMA_PATH: /workspace/server/src/db/schema.sql
      START_EXPO: "false"
      EXPO_PROXY_ENABLED: "false"
      EXPO_STATIC_ENABLED: "true"
      EXPO_AUTO_PREPARE: "false"
      EXPO_WEB_DIST_PATH: /workspace/TreeGuardiansExpo/dist
      EXPO_PROJECT_PATH: /workspace/TreeGuardiansExpo
      EXPO_DEV_SERVER_PORT: ${EXPO_DEV_SERVER_PORT:-8081}
      EXPO_FATAL_ON_EXIT: "false"
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - ../:/workspace
      - server_node_modules:/workspace/server/node_modules
      - ../logs:/workspace/logs
    command: >
      bash -lc "npm install --prefix /workspace/server && node --watch /workspace/app.js"

  expo:
    build:
      context: ..
      dockerfile: docker/images/expo.Dockerfile
    restart: "no"
    working_dir: /workspace/TreeGuardiansExpo
    depends_on:
      server:
        condition: service_started
    stdin_open: true
    tty: true
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_USE_FAST_RESOLVER: "1"
      EXPO_NO_TELEMETRY: "1"
    ports:
      - "${EXPO_DEV_SERVER_PORT:-8081}:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ../:/workspace
      - expo_node_modules:/workspace/TreeGuardiansExpo/node_modules
      - ../logs:/workspace/logs
    command: >
      bash -lc "npm install && npx expo start --go --port ${EXPO_DEV_SERVER_PORT:-8081} --host ${EXPO_HOST_MODE:-tunnel} --clear"

  android-emulator:
    build:
      context: ..
      dockerfile: docker/images/android-emulator.Dockerfile
      args:
        EXPO_SDK_VERSION: "54"
    restart: "no"
    depends_on:
      expo:
        condition: service_started
    environment:
      EXPO_PROXY_TARGET: expo:8081
      BACKEND_PROXY_TARGET: server:4000
      EXPO_PROXY_PORT: 8081
      BACKEND_PROXY_PORT: 4000
      NOVNC_PORT: 6080
      VNC_PORT: 5900
      ADB_DEVICE_SERIAL: emulator-5554
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "6080:6080"
      - "5900:5900"
    volumes:
      - ../logs:/workspace/logs

volumes:
  mysql_data:
  server_node_modules:
  expo_node_modules:
